<!DOCTYPE html>
<html>
<head>
    <title>Bank Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2ff, #f0f9ff);
            color: #1e293b;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: linear-gradient(to right, #2563eb, #38bdf8);
            color: white;
        }

        .navbar h2 {
            font-weight: 600;
        }

        .logout {
            background: white;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            color: #2563eb;
            font-weight: 500;
            transition: 0.3s;
        }

        .logout:hover {
            background: #e0f2fe;
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 20px;
            padding: 20px 30px;
        }

        .stat-box {
            flex: 1;
            background: linear-gradient(135deg, #ffffff, #f1f5f9);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .stat-box h4 {
            font-size: 14px;
            color: #64748b;
        }

        .stat-box p {
            font-size: 22px;
            font-weight: 600;
            margin-top: 5px;
            color: #0f172a;
        }

        /* Cards */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .card {
            background: linear-gradient(135deg, #ffffff, #f8fafc);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin-bottom: 15px;
            color: #2563eb;
            font-size: 16px;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #cbd5f5;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(to right, #2563eb, #38bdf8);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h2>🏦 SmartBank Dashboard</h2>
        <a href="/logout" class="logout">Logout</a>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-box">
            <h4>Total Balance</h4>
            <p>₹ 0.00</p>
        </div>

        <div class="stat-box">
            <h4>Total Accounts</h4>
            <p>0</p>
        </div>

        <div class="stat-box">
            <h4>Last Transaction</h4>
            <p>--</p>
        </div>
    </div>

    <!-- Cards -->
    <div class="container">

        <!-- Deposit -->
        <div class="card">
            <h3>Deposit</h3>
            <form method="post" action="/deposit">
                <input name="account" placeholder="Account Number" required>
                <input name="amount" placeholder="Amount" required>
                <button type="submit">Deposit</button>
            </form>
        </div>

        <!-- Withdraw -->
        <div class="card">
            <h3>Withdraw</h3>
            <form method="post" action="/withdraw">
                <input name="account" placeholder="Account Number" required>
                <input name="amount" placeholder="Amount" required>
                <button type="submit">Withdraw</button>
            </form>
        </div>

        <!-- Transfer -->
        <div class="card">
            <h3>Transfer</h3>
            <form method="post" action="/transfer">
                <input name="source" placeholder="From Account" required>
                <input name="target" placeholder="To Account" required>
                <input name="amount" placeholder="Amount" required>
                <button type="submit">Transfer</button>
            </form>
        </div>

        <!-- Create Account -->
        <div class="card">
            <h3>Create Account</h3>
            <form method="post" action="/create_account">
                <input name="type" placeholder="Account Type" required>
                <button type="submit">Create</button>
            </form>
        </div>

        <!-- Transactions -->
        <div class="card">
            <h3>Transactions</h3>
            <form method="get" action="/transactions">
                <input name="account" placeholder="Account Number" required>
                <button type="submit">View</button>
            </form>
        </div>

    </div>

</body>
</html>
